<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #3b4a5a; }
      .section { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .box-title { font: 600 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .box-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #2c3a4a; }
      .small-text { font: 400 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #4d5b6a; }
      .emph { font: 600 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #2f5d4a; }
    </style>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#5b6b7a"/>
    </marker>
    <filter id="shadow2" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1440" height="900" fill="#f7f9fc"/>

  <text x="720" y="34" text-anchor="middle" class="title">Baseline 与 Ours 的流程对比</text>
  <text x="720" y="58" text-anchor="middle" class="subtitle">共享数据与预处理；仅在「RQ-VAE 输入表征」处分歧，后续生成式推荐一致</text>

  <rect x="360" y="74" rx="14" ry="14" width="720" height="64" fill="#ffffff" stroke="#c9d8ea" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="110" text-anchor="middle" class="box-title">共同输入：原始签到数据</text>

  <line x1="720" y1="138" x2="720" y2="166" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="400" y="174" rx="14" ry="14" width="640" height="64" fill="#ffffff" stroke="#c9d8ea" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="210" text-anchor="middle" class="box-title">共同预处理：POI 属性提取</text>

  <rect x="48" y="252" width="672" height="420" rx="20" ry="20" fill="#eef4fb" stroke="#c9d8ea" stroke-width="1.5"/>
  <rect x="720" y="252" width="672" height="420" rx="20" ry="20" fill="#eef8f4" stroke="#c8e2d7" stroke-width="1.5"/>

  <line x1="720" y1="238" x2="720" y2="272" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="272" x2="384" y2="272" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="272" x2="1056" y2="272" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="384" y1="272" x2="384" y2="300" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>
  <line x1="1056" y1="272" x2="1056" y2="300" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <text x="384" y="322" text-anchor="middle" class="section">Baseline</text>
  <text x="384" y="344" text-anchor="middle" class="small-text">SID 前：类别 + 区域直接作为 RQ-VAE 输入</text>

  <rect x="118" y="352" rx="14" ry="14" width="532" height="82" fill="#dce9f7" stroke="#9eb8d4" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="384" y="382" text-anchor="middle" class="box-title">RQ-VAE 输入构造</text>
  <text x="384" y="406" text-anchor="middle" class="box-text">Uid, Pid, Catname, Region → 连续表征并学习 SID</text>

  <line x1="384" y1="434" x2="384" y2="468" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <text x="1056" y="322" text-anchor="middle" class="section">Ours</text>
  <text x="1056" y="344" text-anchor="middle" class="small-text">SID 前：语义向量 + 地理增强向量</text>

  <rect x="768" y="352" rx="14" ry="14" width="576" height="68" fill="#d9efe6" stroke="#a8d4c4" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="380" text-anchor="middle" class="box-title">文本编码（MiniLM-L6-v2）</text>
  <text x="1056" y="402" text-anchor="middle" class="box-text">类别名称（Catname）→ 基础语义向量</text>

  <line x1="1056" y1="420" x2="1056" y2="452" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="458" rx="14" ry="14" width="576" height="84" fill="#c7e7d9" stroke="#8fc4b0" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="486" text-anchor="middle" class="box-title">GeoPE：地理增强表示</text>
  <text x="1056" y="508" text-anchor="middle" class="box-text">参考点聚类 · 相对方位角 · 旋转位置编码</text>
  <text x="1056" y="530" text-anchor="middle" class="emph">输出 geo_emb</text>

  <line x1="1056" y1="542" x2="1056" y2="578" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="584" rx="14" ry="14" width="576" height="76" fill="#b5dfcc" stroke="#7ab89a" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="614" text-anchor="middle" class="box-title">RQ-VAE 输入构造</text>
  <text x="1056" y="638" text-anchor="middle" class="box-text">Uid, Pid, geo_emb → 连续表征并学习 SID</text>

  <line x1="384" y1="468" x2="384" y2="670" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="1056" y1="660" x2="1056" y2="670" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="384" y1="670" x2="720" y2="670" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="1056" y1="670" x2="720" y2="670" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="670" x2="720" y2="700" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <circle cx="720" cy="670" r="5" fill="#f7f9fc" stroke="#5b6b7a" stroke-width="2"/>

  <rect x="330" y="706" rx="14" ry="14" width="780" height="72" fill="#e8edf5" stroke="#9aa8bc" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="734" text-anchor="middle" class="box-title">共同下游（与 Baseline 一致）</text>
  <text x="720" y="756" text-anchor="middle" class="box-text">历史 SID 序列 → 微调 LLaMA → 预测下一 POI 的 SID → 映射至目标 POI</text>
</svg>
