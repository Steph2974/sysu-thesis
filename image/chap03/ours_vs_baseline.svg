<svg width="1440" height="980" viewBox="0 0 1440 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .subtitle { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #3b4a5a; }
      .section { font: 700 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .box-title { font: 600 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .box-text { font: 500 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #2c3a4a; }
      .small-text { font: 400 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #4d5b6a; }
      .emph { font: 600 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #2f5d4a; }
    </style>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#5b6b7a"/>
    </marker>
    <filter id="shadow2" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1440" height="980" fill="#f7f9fc"/>

  <text x="720" y="40" text-anchor="middle" class="title">Baseline 与 Ours 的流程对比</text>
  <text x="720" y="68" text-anchor="middle" class="subtitle">共享数据与预处理；仅在「RQ-VAE 输入表征」处分歧，后续生成式推荐一致</text>

  <rect x="360" y="88" rx="14" ry="14" width="720" height="72" fill="#ffffff" stroke="#c9d8ea" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="128" text-anchor="middle" class="box-title">共同输入：原始签到数据</text>

  <line x1="720" y1="160" x2="720" y2="196" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="400" y="202" rx="14" ry="14" width="640" height="72" fill="#ffffff" stroke="#c9d8ea" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="242" text-anchor="middle" class="box-title">共同预处理：POI 属性提取</text>

  <rect x="48" y="292" width="672" height="468" rx="20" ry="20" fill="#eef4fb" stroke="#c9d8ea" stroke-width="1.5"/>
  <rect x="720" y="292" width="672" height="468" rx="20" ry="20" fill="#eef8f4" stroke="#c8e2d7" stroke-width="1.5"/>

  <line x1="720" y1="274" x2="720" y2="312" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="312" x2="384" y2="312" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="312" x2="1056" y2="312" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="384" y1="312" x2="384" y2="342" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>
  <line x1="1056" y1="312" x2="1056" y2="342" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <!-- 栏目标题置于分叉竖线箭头之下，避免与竖线 / 箭头标记重叠 -->
  <text x="384" y="362" text-anchor="middle" class="section">Baseline</text>
  <text x="384" y="384" text-anchor="middle" class="small-text">SID 前：类别 + 区域直接作为 RQ-VAE 输入</text>

  <rect x="118" y="402" rx="14" ry="14" width="532" height="88" fill="#dce9f7" stroke="#9eb8d4" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="384" y="434" text-anchor="middle" class="box-title">RQ-VAE 输入构造</text>
  <text x="384" y="460" text-anchor="middle" class="box-text">Uid, Pid, Catname, Region → 连续表征</text>

  <line x1="384" y1="490" x2="384" y2="530" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="118" y="536" rx="14" ry="14" width="532" height="76" fill="#c9ddf2" stroke="#8fafcc" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="384" y="568" text-anchor="middle" class="box-title">学习 SID</text>
  <text x="384" y="594" text-anchor="middle" class="box-text">离散语义标识由上述表征经 RQ-VAE 得到</text>

  <text x="1056" y="362" text-anchor="middle" class="section">Ours</text>
  <text x="1056" y="384" text-anchor="middle" class="small-text">SID 前：语义向量 + 地理增强向量</text>

  <rect x="768" y="402" rx="14" ry="14" width="576" height="72" fill="#d9efe6" stroke="#a8d4c4" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="432" text-anchor="middle" class="box-title">文本编码（MiniLM-L6-v2）</text>
  <text x="1056" y="456" text-anchor="middle" class="box-text">类别名称（Catname）→ 基础语义向量</text>

  <line x1="1056" y1="474" x2="1056" y2="512" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="518" rx="14" ry="14" width="576" height="92" fill="#c7e7d9" stroke="#8fc4b0" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="548" text-anchor="middle" class="box-title">GeoPE：地理增强表示</text>
  <text x="1056" y="572" text-anchor="middle" class="box-text">参考点聚类 · 相对方位角 · 旋转位置编码</text>
  <text x="1056" y="596" text-anchor="middle" class="emph">输出 geo_emb</text>

  <line x1="1056" y1="610" x2="1056" y2="648" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="654" rx="14" ry="14" width="576" height="80" fill="#b5dfcc" stroke="#7ab89a" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="686" text-anchor="middle" class="box-title">RQ-VAE 输入构造</text>
  <text x="1056" y="712" text-anchor="middle" class="box-text">Uid, Pid, geo_emb → 连续表征并学习 SID</text>

  <line x1="384" y1="612" x2="384" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="1056" y1="734" x2="1056" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
 

  <text x="1056" y="362" text-anchor="middle" class="section">Ours</text>
  <text x="1056" y="384" text-anchor="middle" class="small-text">SID 前：语义向量 + 地理增强向量</text>

  <rect x="768" y="402" rx="14" ry="14" width="576" height="72" fill="#d9efe6" stroke="#a8d4c4" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="432" text-anchor="middle" class="box-title">文本编码（MiniLM-L6-v2）</text>
  <text x="1056" y="456" text-anchor="middle" class="box-text">类别名称（Catname）→ 基础语义向量</text>

  <line x1="1056" y1="474" x2="1056" y2="512" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="518" rx="14" ry="14" width="576" height="92" fill="#c7e7d9" stroke="#8fc4b0" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="548" text-anchor="middle" class="box-title">GeoPE：地理增强表示</text>
  <text x="1056" y="572" text-anchor="middle" class="box-text">参考点聚类 · 相对方位角 · 旋转位置编码</text>
  <text x="1056" y="596" text-anchor="middle" class="emph">输出 geo_emb</text>

  <line x1="1056" y1="610" x2="1056" y2="648" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <rect x="768" y="654" rx="14" ry="14" width="576" height="80" fill="#b5dfcc" stroke="#7ab89a" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="1056" y="686" text-anchor="middle" class="box-title">RQ-VAE 输入构造</text>
  <text x="1056" y="712" text-anchor="middle" class="box-text">Uid, Pid, geo_emb → 连续表征并学习 SID</text>

  <line x1="384" y1="612" x2="384" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="1056" y1="734" x2="1056" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <line x1="384" y1="758" x2="720" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="1056" y1="758" x2="720" y2="758" stroke="#5b6b7a" stroke-width="2.2"/>
  <line x1="720" y1="758" x2="720" y2="788" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow2)"/>

  <circle cx="720" cy="758" r="5" fill="#f7f9fc" stroke="#5b6b7a" stroke-width="2"/>

  <rect x="330" y="796" rx="14" ry="14" width="780" height="80" fill="#e8edf5" stroke="#9aa8bc" stroke-width="1.8" filter="url(#shadow2)"/>
  <text x="720" y="828" text-anchor="middle" class="box-title">共同下游（与 Baseline 一致）</text>
  <text x="720" y="854" text-anchor="middle" class="box-text">历史 SID 序列 → 微调 LLaMA → 预测下一 POI 的 SID → 映射至目标 POI</text>
</svg>
