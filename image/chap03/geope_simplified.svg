<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 32px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #64748b; }
      .h { font: 700 22px 'Noto Sans SC','Microsoft YaHei',sans-serif; }
      .t { font: 600 16px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #0f172a; }
      .s { font: 500 14px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #475569; }
      .xs { font: 500 12px 'Noto Sans SC','Microsoft YaHei',sans-serif; fill: #64748b; }
      .math { font: italic 600 20px 'Times New Roman', serif; fill: #0f172a; }
      .maths { font: italic 600 16px 'Times New Roman', serif; fill: #0f172a; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .arrow { stroke: #64748b; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); }
      .dashed { stroke-dasharray: 6 5; }
    </style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.4" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowSoft" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="#f8fafc"/>

  <text x="700" y="52" text-anchor="middle" class="title">GeoPE 隐式地理增强表示构建流程</text>
  <text x="700" y="80" text-anchor="middle" class="subtitle">基础语义表示 → 多参考点方位角 → 分块旋转注入 → 地理增强表示与 RQ-VAE</text>

  <!-- connectors -->
  <line x1="318" y1="355" x2="356" y2="355" class="arrow"/>
  <line x1="648" y1="355" x2="686" y2="355" class="arrow"/>
  <line x1="1018" y1="355" x2="1056" y2="355" class="arrow"/>

  <!-- Panel 1 -->
  <g transform="translate(28,120)">
    <rect x="0" y="0" rx="22" ry="22" width="290" height="510" class="panel" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="14" ry="14" width="254" height="54" fill="#dbeafe"/>
    <circle cx="46" cy="45" r="18" fill="#2563eb"/>
    <text x="46" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">1</text>
    <text x="78" y="52" class="h" fill="#1d4ed8">基础语义表示</text>

    <rect x="44" y="110" rx="16" ry="16" width="202" height="82" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="145" y="145" text-anchor="middle" class="t">POI 文本属性</text>
    <text x="145" y="172" text-anchor="middle" class="maths">A<tspan baseline-shift="sub" font-size="12">p</tspan></text>

    <line x1="145" y1="192" x2="145" y2="238" class="arrow"/>

    <rect x="44" y="246" rx="16" ry="16" width="202" height="92" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="145" y="282" text-anchor="middle" class="t">文本编码器</text>
    <text x="145" y="310" text-anchor="middle" class="s">all-MiniLM-L6-v2</text>

    <line x1="145" y1="338" x2="145" y2="385" class="arrow"/>

    <text x="145" y="418" text-anchor="middle" class="t" fill="#1d4ed8">基础语义向量</text>
    <text x="145" y="444" text-anchor="middle" class="math">x<tspan baseline-shift="sub" font-size="14">p</tspan> ∈ ℝ<tspan baseline-shift="super" font-size="14">D</tspan></text>

    <g transform="translate(38,470)">
      <rect x="0" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <rect x="32" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <rect x="64" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <rect x="96" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <rect x="128" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <rect x="160" y="0" width="32" height="28" fill="#bfdbfe" stroke="#3b82f6"/>
      <text x="208" y="20" class="s">…</text>
    </g>

    <rect x="44" y="540" rx="14" ry="14" width="202" height="46" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2"/>
    <text x="145" y="569" text-anchor="middle" class="s">仅包含类别语义信息</text>
  </g>

  <!-- Panel 2 -->
  <g transform="translate(358,120)">
    <rect x="0" y="0" rx="22" ry="22" width="290" height="510" class="panel" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="14" ry="14" width="254" height="54" fill="#dcfce7"/>
    <circle cx="46" cy="45" r="18" fill="#16a34a"/>
    <text x="46" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">2</text>
    <text x="78" y="52" class="h" fill="#15803d">参考点与方位角</text>

    <rect x="30" y="96" width="230" height="265" fill="#f8fafc" stroke="#86efac" stroke-width="1.4"/>
    <line x1="50" y1="340" x2="50" y2="115" stroke="#334155" stroke-width="1.8"/>
    <line x1="50" y1="340" x2="238" y2="340" stroke="#334155" stroke-width="1.8"/>
    <text x="40" y="120" class="xs">北</text>
    <text x="230" y="357" class="xs">东</text>

    <!-- gray points -->
    <g fill="#cbd5e1" stroke="#94a3b8" stroke-width="0.6">
      <circle cx="78" cy="148" r="4"/><circle cx="105" cy="210" r="4"/><circle cx="132" cy="170" r="4"/>
      <circle cx="182" cy="148" r="4"/><circle cx="204" cy="196" r="4"/><circle cx="95" cy="285" r="4"/>
      <circle cx="156" cy="248" r="4"/><circle cx="222" cy="260" r="4"/><circle cx="120" cy="322" r="4"/>
      <circle cx="192" cy="300" r="4"/><circle cx="74" cy="250" r="4"/><circle cx="220" cy="146" r="4"/>
    </g>

    <!-- target and refs -->
    <circle cx="146" cy="248" r="7" fill="#dc2626"/>
    <text x="154" y="267" class="maths">p</text>

    <circle cx="92" cy="172" r="7" fill="#16a34a"/>
    <circle cx="208" cy="208" r="7" fill="#16a34a"/>
    <circle cx="84" cy="298" r="7" fill="#16a34a"/>
    <text x="80" y="160" class="maths">R₁</text>
    <text x="214" y="198" class="maths">R₂</text>
    <text x="66" y="318" class="maths">RΩ</text>

    <line x1="92" y1="172" x2="146" y2="248" class="soft dashed"/>
    <line x1="208" y1="208" x2="146" y2="248" class="soft dashed"/>
    <line x1="84" y1="298" x2="146" y2="248" class="soft dashed"/>

    <path d="M146 224 A24 24 0 0 1 164 239" fill="none" stroke="#64748b" stroke-width="1.6"/>
    <path d="M166 248 A26 26 0 0 1 153 270" fill="none" stroke="#64748b" stroke-width="1.6"/>
    <text x="154" y="222" class="xs">θₚ,₁</text>
    <text x="174" y="250" class="xs">θₚ,₂</text>
    <text x="107" y="268" class="xs">θₚ,Ω</text>

    <text x="145" y="392" text-anchor="middle" class="s">K-Means 得到参考点集合</text>
    <rect x="48" y="410" rx="12" ry="12" width="194" height="48" fill="#f0fdf4" stroke="#86efac"/>
    <text x="145" y="440" text-anchor="middle" class="maths">Θ<tspan baseline-shift="sub" font-size="12">p</tspan> = {θ<tspan baseline-shift="sub" font-size="12">p,1</tspan>, θ<tspan baseline-shift="sub" font-size="12">p,2</tspan>, …, θ<tspan baseline-shift="sub" font-size="12">p,Ω</tspan>}</text>

    <rect x="38" y="540" rx="14" ry="14" width="214" height="46" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
    <text x="145" y="569" text-anchor="middle" class="s">多参考点刻画相对空间位置</text>
  </g>

  <!-- Panel 3 -->
  <g transform="translate(688,120)">
    <rect x="0" y="0" rx="22" ry="22" width="330" height="510" class="panel" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="14" ry="14" width="294" height="54" fill="#ffedd5"/>
    <circle cx="46" cy="45" r="18" fill="#ea580c"/>
    <text x="46" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">3</text>
    <text x="78" y="52" class="h" fill="#c2410c">GeoPE 旋转注入</text>

    <text x="52" y="116" class="t">语义向量分块</text>
    <g transform="translate(52,132)">
      <rect x="0" y="0" width="58" height="34" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="58" y="0" width="58" height="34" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="116" y="0" width="58" height="34" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="174" y="0" width="58" height="34" fill="#dbeafe" stroke="#60a5fa"/>
      <text x="21" y="53" class="xs">xₚ⁽¹⁾</text>
      <text x="79" y="53" class="xs">xₚ⁽²⁾</text>
      <text x="137" y="53" class="xs">…</text>
      <text x="189" y="53" class="xs">xₚ⁽Ω⁾</text>
    </g>

    <text x="52" y="215" class="t">角度作用到对应子块</text>

    <g transform="translate(52,232)">
      <rect x="0" y="0" rx="12" ry="12" width="72" height="40" fill="#eff6ff" stroke="#60a5fa"/>
      <text x="36" y="25" text-anchor="middle" class="maths">xₚ⁽ω⁾</text>
      <line x1="72" y1="20" x2="106" y2="20" class="arrow"/>
      <rect x="116" y="0" rx="12" ry="12" width="70" height="40" fill="#f0fdf4" stroke="#86efac"/>
      <text x="151" y="25" text-anchor="middle" class="maths">θₚ,ω</text>
      <line x1="186" y1="20" x2="220" y2="20" class="arrow"/>

      <rect x="232" y="-8" width="44" height="44" fill="#fff7ed" stroke="#fdba74"/>
      <line x1="242" y1="28" x2="242" y2="2" stroke="#0f172a" stroke-width="1.5"/>
      <line x1="242" y1="28" x2="268" y2="28" stroke="#0f172a" stroke-width="1.5"/>
      <line x1="242" y1="28" x2="264" y2="10" stroke="#f97316" stroke-width="2.2"/>
      <path d="M251 26 A10 10 0 0 1 258 20" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </g>

    <text x="52" y="322" class="s">对每个 2 维子空间执行旋转</text>

    <rect x="40" y="350" rx="14" ry="14" width="250" height="94" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
    <text x="165" y="386" text-anchor="middle" class="maths">[x̂₂ᵢ⁽ω⁾, x̂₂ᵢ₊₁⁽ω⁾]ᵀ</text>
    <text x="165" y="410" text-anchor="middle" class="maths">= Rot(θₚ,ω) · [x₂ᵢ⁽ω⁾, x₂ᵢ₊₁⁽ω⁾]ᵀ</text>

    <path d="M56 482 L274 482" stroke="#fdba74" stroke-width="1.4" stroke-dasharray="5 5"/>
    <text x="165" y="510" text-anchor="middle" class="s">不同角度 → 不同子块 → 隐式注入空间信息</text>

    <rect x="48" y="540" rx="14" ry="14" width="234" height="46" fill="#fff7ed" stroke="#fdba74" stroke-width="1.2"/>
    <text x="165" y="569" text-anchor="middle" class="s">通过几何变换而非直接拼接坐标</text>
  </g>

  <!-- Panel 4 -->
  <g transform="translate(1058,120)">
    <rect x="0" y="0" rx="22" ry="22" width="314" height="510" class="panel" filter="url(#shadow)"/>
    <rect x="18" y="18" rx="14" ry="14" width="278" height="54" fill="#ede9fe"/>
    <circle cx="46" cy="45" r="18" fill="#7c3aed"/>
    <text x="46" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">4</text>
    <text x="78" y="52" class="h" fill="#6d28d9">输出与 SID 学习</text>

    <text x="52" y="118" class="t">旋转后子块拼接</text>
    <g transform="translate(52,142)">
      <rect x="0" y="0" width="44" height="30" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="44" y="0" width="44" height="30" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="88" y="0" width="44" height="30" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="132" y="0" width="44" height="30" fill="#ede9fe" stroke="#8b5cf6"/>
      <text x="10" y="50" class="xs">x̂ₚ⁽¹⁾</text>
      <text x="54" y="50" class="xs">x̂ₚ⁽²⁾</text>
      <text x="98" y="50" class="xs">…</text>
      <text x="142" y="50" class="xs">x̂ₚ⁽Ω⁾</text>
    </g>

    <line x1="140" y1="206" x2="140" y2="246" class="arrow"/>

    <text x="140" y="280" text-anchor="middle" class="t" fill="#6d28d9">地理增强表示</text>
    <text x="140" y="308" text-anchor="middle" class="math">x′<tspan baseline-shift="sub" font-size="14">p</tspan> = GeoPE(x<tspan baseline-shift="sub" font-size="14">p</tspan>, l<tspan baseline-shift="sub" font-size="14">p</tspan>)</text>

    <g transform="translate(42,332)">
      <rect x="0" y="0" width="28" height="26" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="28" y="0" width="28" height="26" fill="#dbeafe" stroke="#60a5fa"/>
      <rect x="56" y="0" width="28" height="26" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="84" y="0" width="28" height="26" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="112" y="0" width="28" height="26" fill="#dcfce7" stroke="#86efac"/>
      <rect x="140" y="0" width="28" height="26" fill="#dcfce7" stroke="#86efac"/>
      <rect x="168" y="0" width="28" height="26" fill="#ede9fe" stroke="#8b5cf6"/>
      <rect x="196" y="0" width="28" height="26" fill="#ede9fe" stroke="#8b5cf6"/>
    </g>
    <text x="140" y="378" text-anchor="middle" class="s">语义信息 + 空间信息</text>

    <line x1="140" y1="394" x2="140" y2="432" class="arrow"/>
    <rect x="78" y="438" rx="16" ry="16" width="124" height="58" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="140" y="473" text-anchor="middle" class="t">RQ-VAE</text>

    <line x1="140" y1="496" x2="140" y2="534" class="arrow"/>
    <rect x="68" y="540" rx="16" ry="16" width="144" height="50" fill="#faf5ff" stroke="#a78bfa" stroke-width="1.4"/>
    <text x="140" y="571" text-anchor="middle" class="t" fill="#6d28d9">空间感知 SID</text>
  </g>
</svg>
