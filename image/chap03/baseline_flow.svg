<svg width="1200" height="988" viewBox="0 0 1200 988" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 26px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .subtitle { font: 500 15px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #3b4a5a; }
      .box-title { font: 600 17px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2d3d; }
      .box-text { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #2c3a4a; }
      .small-text { font: 400 13px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #4d5b6a; }
      .stage { font: 600 12px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #5b6b7a; letter-spacing: 0.03em; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#5b6b7a"/>
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="988" fill="#f7f9fc"/>

  <text x="600" y="44" text-anchor="middle" class="title">Baseline 方法流程图</text>
  <text x="600" y="72" text-anchor="middle" class="subtitle">原始签到数据 → POI 表征与 SID 学习 → 序列建模 → 生成式下一 POI 推荐</text>

  <!-- ① 原始数据 -->
  <text x="48" y="158" class="stage">① 数据输入</text>
  <rect x="250" y="110" rx="14" ry="14" width="700" height="92" fill="#ffffff" stroke="#c9d8ea" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="144" text-anchor="middle" class="box-title">原始签到数据</text>
  <text x="600" y="170" text-anchor="middle" class="box-text">字段：userId, venueId, venueCategoryId, venueCategory, latitude, longitude,</text>
  <text x="600" y="190" text-anchor="middle" class="box-text">timezoneOffset, utcTimestamp</text>

  <line x1="600" y1="202" x2="600" y2="244" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ② 预处理 -->
  <text x="48" y="297" class="stage">② 预处理</text>
  <rect x="310" y="250" rx="14" ry="14" width="580" height="86" fill="#dce9f7" stroke="#9eb8d4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="282" text-anchor="middle" class="box-title">POI 属性提取与字段对齐</text>
  <text x="600" y="310" text-anchor="middle" class="box-text">输出：Uid, Pid, Catname, Region, Time</text>

  <line x1="600" y1="336" x2="600" y2="378" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ③ RQ-VAE 输入 -->
  <text x="48" y="432" class="stage">③ 连续表征</text>
  <rect x="280" y="384" rx="14" ry="14" width="640" height="96" fill="#c9ddf2" stroke="#8fafcc" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="416" text-anchor="middle" class="box-title">语义标识构造（RQ-VAE 输入）</text>
  <text x="600" y="444" text-anchor="middle" class="box-text">基于 Uid, Pid, Catname, Region 构造 POI 的连续向量表示</text>
  <text x="600" y="468" text-anchor="middle" class="small-text">送入 RQ-VAE，学习各级码本下的离散 token</text>

  <line x1="600" y1="480" x2="600" y2="522" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ④ SID -->
  <text x="48" y="565" class="stage">④ 离散 SID</text>
  <rect x="370" y="528" rx="14" ry="14" width="460" height="82" fill="#b7d0ec" stroke="#7fa3c4" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="560" text-anchor="middle" class="box-title">学习语义标识 SID</text>
  <text x="600" y="588" text-anchor="middle" class="box-text">SID = ⟨a_i⟩⟨b_j⟩⟨c_k⟩⋯（多级残差量化）</text>

  <line x1="600" y1="610" x2="600" y2="652" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ⑤ 序列 -->
  <text x="48" y="700" class="stage">⑤ 用户序列</text>
  <rect x="240" y="658" rx="14" ry="14" width="720" height="100" fill="#a7c6e7" stroke="#6f94b8" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="690" text-anchor="middle" class="box-title">构造用户历史访问序列</text>
  <text x="600" y="718" text-anchor="middle" class="box-text">形式：user_u visited ⟨SID⟩ at [time], …</text>
  <text x="600" y="742" text-anchor="middle" class="small-text">本阶段主要使用 SID 与时间信息</text>

  <line x1="600" y1="758" x2="600" y2="800" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- ⑥ LLM -->
  <text x="48" y="835" class="stage">⑥ 序列预测</text>
  <rect x="360" y="806" rx="14" ry="14" width="480" height="78" fill="#8fb6df" stroke="#5e8ab8" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="838" text-anchor="middle" class="box-title">微调大语言模型（如 LLaMA）</text>
  <text x="600" y="866" text-anchor="middle" class="box-text">以历史 SID 序列为条件，预测下一兴趣点的 SID</text>

  <line x1="600" y1="884" x2="600" y2="926" stroke="#5b6b7a" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- 输出 -->
  <text x="48" y="948" class="stage">⑦ 输出</text>
  <rect x="380" y="932" rx="14" ry="14" width="440" height="42" fill="#7ea8d7" stroke="#4a7aaa" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="600" y="954" text-anchor="middle" class="box-title" style="font-size:15px;">下一 POI 的 SID → 映射至具体 POI</text>
  <text x="600" y="970" text-anchor="middle" class="small-text">生成式 Next POI 推荐</text>
</svg>
