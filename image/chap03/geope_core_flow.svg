<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 32px "Times New Roman", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px "Times New Roman", Arial, sans-serif; fill: #475569; }
      .panelTitle { font: 700 22px "Times New Roman", Arial, sans-serif; fill: #111827; }
      .label { font: 600 17px "Times New Roman", Arial, sans-serif; fill: #1f2937; }
      .small { font: 500 14px "Times New Roman", Arial, sans-serif; fill: #475569; }
      .math { font: italic 700 20px "Times New Roman", serif; fill: #111827; }
      .mathSmall { font: italic 16px "Times New Roman", serif; fill: #111827; }
      .hint { font: 500 13px "Times New Roman", Arial, sans-serif; fill: #64748b; }
      .flow { stroke: #1f2937; stroke-width: 2.4; fill: none; marker-end: url(#arrowMain); }
      .assist { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <marker id="arrowMain" markerWidth="9" markerHeight="9" refX="7.2" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrowSoft" markerWidth="7" markerHeight="7" refX="5.6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#64748b"/>
    </marker>

    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="url(#bg)"/>

  <text x="700" y="52" text-anchor="middle" class="title">GeoPE Core Mechanism</text>
  <text x="700" y="82" text-anchor="middle" class="subtitle">Reference Anchors and Bearings (3.3.2-3.3.3) + Rotation Injection (3.3.4)</text>

  <g>
    <rect x="116" y="112" rx="12" ry="12" width="120" height="34" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="176" y="135" text-anchor="middle" class="small">Step 1</text>
    <rect x="490" y="112" rx="12" ry="12" width="120" height="34" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
    <text x="550" y="135" text-anchor="middle" class="small">Step 2</text>
    <rect x="864" y="112" rx="12" ry="12" width="120" height="34" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="924" y="135" text-anchor="middle" class="small">Step 3</text>
  </g>

  <g>
    <rect x="70" y="160" rx="24" ry="24" width="380" height="530" fill="url(#panel)" stroke="#94a3b8" stroke-width="1.6" filter="url(#shadow)"/>
    <text x="260" y="197" text-anchor="middle" class="panelTitle">Build Anchor Set</text>
    <text x="260" y="222" text-anchor="middle" class="small">K-Means on all POI coordinates</text>

    <rect x="98" y="246" width="324" height="402" rx="12" ry="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.1"/>

    <path d="M115 300 C175 260, 235 280, 300 250 C345 230, 390 250, 410 290" stroke="#cbd5e1" stroke-width="4" fill="none" opacity="0.65"/>
    <path d="M108 400 C170 370, 260 390, 330 360 C365 345, 396 350, 415 370" stroke="#cbd5e1" stroke-width="4" fill="none" opacity="0.65"/>
    <path d="M118 520 C180 495, 245 520, 312 500 C357 486, 392 490, 414 515" stroke="#cbd5e1" stroke-width="4" fill="none" opacity="0.65"/>

    <circle cx="165" cy="327" r="4.2" fill="#64748b"/>
    <circle cx="195" cy="352" r="4.2" fill="#64748b"/>
    <circle cx="219" cy="310" r="4.2" fill="#64748b"/>
    <circle cx="255" cy="338" r="4.2" fill="#64748b"/>
    <circle cx="283" cy="305" r="4.2" fill="#64748b"/>
    <circle cx="315" cy="332" r="4.2" fill="#64748b"/>
    <circle cx="343" cy="356" r="4.2" fill="#64748b"/>
    <circle cx="371" cy="320" r="4.2" fill="#64748b"/>
    <circle cx="162" cy="458" r="4.2" fill="#64748b"/>
    <circle cx="194" cy="483" r="4.2" fill="#64748b"/>
    <circle cx="231" cy="452" r="4.2" fill="#64748b"/>
    <circle cx="266" cy="486" r="4.2" fill="#64748b"/>
    <circle cx="301" cy="454" r="4.2" fill="#64748b"/>
    <circle cx="332" cy="480" r="4.2" fill="#64748b"/>
    <circle cx="362" cy="446" r="4.2" fill="#64748b"/>
    <circle cx="141" cy="564" r="4.2" fill="#64748b"/>
    <circle cx="186" cy="586" r="4.2" fill="#64748b"/>
    <circle cx="226" cy="556" r="4.2" fill="#64748b"/>
    <circle cx="263" cy="590" r="4.2" fill="#64748b"/>
    <circle cx="302" cy="560" r="4.2" fill="#64748b"/>
    <circle cx="338" cy="586" r="4.2" fill="#64748b"/>

    <circle cx="188" cy="334" r="11" fill="#2563eb"/>
    <circle cx="188" cy="334" r="21" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="206" y="327" class="mathSmall">R1</text>

    <circle cx="334" cy="470" r="11" fill="#2563eb"/>
    <circle cx="334" cy="470" r="21" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="352" y="462" class="mathSmall">R2</text>

    <circle cx="228" cy="576" r="11" fill="#2563eb"/>
    <circle cx="228" cy="576" r="21" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="246" y="568" class="mathSmall">R3</text>

    <text x="260" y="670" text-anchor="middle" class="hint">R = {R1, R2, ..., R©}</text>
  </g>

  <path d="M455 424 C485 424, 497 424, 522 424" class="flow"/>

  <g>
    <rect x="510" y="160" rx="24" ry="24" width="380" height="530" fill="url(#panel)" stroke="#94a3b8" stroke-width="1.6" filter="url(#shadow)"/>
    <text x="700" y="197" text-anchor="middle" class="panelTitle">Compute Bearing Angles</text>
    <text x="700" y="222" text-anchor="middle" class="small">For each POI p and each anchor Rw</text>

    <rect x="538" y="246" width="324" height="402" rx="12" ry="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.1"/>

    <circle cx="700" cy="430" r="12" fill="#111827"/>
    <circle cx="700" cy="430" r="5" fill="#ffffff"/>
    <text x="719" y="438" class="math">lp</text>

    <circle cx="612" cy="318" r="10" fill="#2563eb"/>
    <circle cx="612" cy="318" r="20" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="629" y="311" class="mathSmall">R1</text>

    <circle cx="795" cy="334" r="10" fill="#2563eb"/>
    <circle cx="795" cy="334" r="20" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="812" y="327" class="mathSmall">R2</text>

    <circle cx="620" cy="560" r="10" fill="#2563eb"/>
    <circle cx="620" cy="560" r="20" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35"/>
    <text x="637" y="553" class="mathSmall">R3</text>

    <line x1="700" y1="430" x2="620" y2="327" class="assist"/>
    <line x1="700" y1="430" x2="785" y2="341" class="assist"/>
    <line x1="700" y1="430" x2="628" y2="553" class="assist"/>

    <path d="M675 398 A45 45 0 0 0 647 365" stroke="#16a34a" stroke-width="2.2" fill="none"/>
    <path d="M735 400 A52 52 0 0 1 770 370" stroke="#16a34a" stroke-width="2.2" fill="none"/>
    <path d="M676 454 A48 48 0 0 1 651 495" stroke="#16a34a" stroke-width="2.2" fill="none"/>

    <text x="652" y="372" class="mathSmall">theta p,1</text>
    <text x="760" y="376" class="mathSmall">theta p,2</text>
    <text x="651" y="499" class="mathSmall">theta p,3</text>

    <text x="700" y="610" text-anchor="middle" class="hint">theta p,w = atan2(latp - latw, lonp - lonw)</text>
    <text x="700" y="634" text-anchor="middle" class="hint">Theta p = {theta p,1, theta p,2, ..., theta p,Omega}</text>
  </g>

  <path d="M895 424 C925 424, 937 424, 962 424" class="flow"/>

  <g>
    <rect x="950" y="160" rx="24" ry="24" width="380" height="530" fill="url(#panel)" stroke="#94a3b8" stroke-width="1.6" filter="url(#shadow)"/>
    <text x="1140" y="197" text-anchor="middle" class="panelTitle">Inject Spatial Signal by Rotation</text>
    <text x="1140" y="222" text-anchor="middle" class="small">Block-wise rotation controlled by theta p,w</text>

    <rect x="978" y="246" width="324" height="402" rx="12" ry="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.1"/>

    <text x="1000" y="286" class="math">xp</text>
    <rect x="1030" y="264" width="230" height="40" fill="#e2e8f0" stroke="#334155" stroke-width="1.6"/>
    <line x1="1087" y1="264" x2="1087" y2="304" stroke="#334155" stroke-width="1.6"/>
    <line x1="1144" y1="264" x2="1144" y2="304" stroke="#334155" stroke-width="1.6"/>
    <line x1="1201" y1="264" x2="1201" y2="304" stroke="#334155" stroke-width="1.6"/>
    <text x="1145" y="327" text-anchor="middle" class="small">split into Omega blocks: xp(1), xp(2), ..., xp(Omega)</text>

    <path d="M1145 335 L1145 365" class="assist"/>

    <rect x="1005" y="370" rx="10" ry="10" width="92" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="1051" y="398" text-anchor="middle" class="mathSmall">R(theta1)</text>

    <rect x="1098" y="370" rx="10" ry="10" width="92" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="1144" y="398" text-anchor="middle" class="mathSmall">R(theta2)</text>

    <rect x="1191" y="370" rx="10" ry="10" width="92" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4"/>
    <text x="1237" y="398" text-anchor="middle" class="mathSmall">R(thetaO)</text>

    <text x="1143" y="438" text-anchor="middle" class="small">rotate each 2D pair in every block</text>
    <text x="1143" y="460" text-anchor="middle" class="hint">[x2i(w), x2i+1(w)]T -> R(theta p,w)[x2i(w), x2i+1(w)]T</text>

    <path d="M1145 470 L1145 507" class="assist"/>

    <text x="994" y="548" class="math">x'p</text>
    <rect x="1030" y="526" width="230" height="40" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.6"/>
    <line x1="1087" y1="526" x2="1087" y2="566" stroke="#1e3a8a" stroke-width="1.6"/>
    <line x1="1144" y1="526" x2="1144" y2="566" stroke="#1e3a8a" stroke-width="1.6"/>
    <line x1="1201" y1="526" x2="1201" y2="566" stroke="#1e3a8a" stroke-width="1.6"/>
    <text x="1145" y="594" text-anchor="middle" class="hint">x'p = GeoPE(xp, lp)</text>
    <text x="1145" y="618" text-anchor="middle" class="hint">semantic + spatial enhanced representation</text>
  </g>

  <g>
    <rect x="170" y="726" rx="14" ry="14" width="1060" height="62" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3"/>
    <text x="700" y="752" text-anchor="middle" class="label">Core idea: use relative bearings to drive geometric transforms inside semantic vectors</text>
    <text x="700" y="774" text-anchor="middle" class="small">instead of directly concatenating latitude/longitude as external features</text>
  </g>
</svg>
