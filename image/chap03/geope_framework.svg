<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 30px "Times New Roman", "Noto Serif SC", serif; fill: #1f2937; }
      .subtitle { font: 500 17px "Times New Roman", "Noto Serif SC", serif; fill: #64748b; }
      .panel-title { font: 700 26px "Times New Roman", "Noto Serif SC", serif; fill: #0f172a; }
      .step-tag { font: 700 14px "Times New Roman", "Noto Serif SC", serif; fill: #1f2937; }
      .label { font: 700 18px "Times New Roman", "Noto Serif SC", serif; fill: #111827; }
      .small { font: 500 14px "Times New Roman", "Noto Serif SC", serif; fill: #64748b; }
      .math { font: italic 700 18px "Times New Roman", serif; fill: #111827; }
      .mathsmall { font: italic 16px "Times New Roman", serif; fill: #111827; }
      .flow-line { stroke: #1f2937; stroke-width: 2; marker-end: url(#arrowMain); fill: none; }
      .inner-line { stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrowSoft); fill: none; }
    </style>

    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>

    <linearGradient id="geopeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <marker id="arrowMain" markerWidth="8" markerHeight="8" refX="6.6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f2937"/>
    </marker>
    <marker id="arrowSoft" markerWidth="6" markerHeight="6" refX="4.8" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <g id="segmentBlock">
      <rect x="0" y="0" width="58" height="34" fill="currentColor" stroke="#1f2937" stroke-width="2"/>
      <line x1="29" y1="0" x2="29" y2="34" stroke="#1f2937" stroke-width="2"/>
    </g>

    <g id="stepBadge">
      <rect x="0" y="0" rx="9" ry="9" width="74" height="26" fill="#eef2f7" stroke="#64748b" stroke-width="1.2"/>
    </g>

    <g id="refPoint">
      <circle cx="0" cy="0" r="11" fill="#2563eb"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#2563eb" stroke-width="2.2" opacity="0.35"/>
    </g>
  </defs>

  <!-- Background layer -->
  <rect x="0" y="0" width="1400" height="760" fill="url(#bgGradient)"/>

  <!-- Header -->
  <g id="header">
    <text x="700" y="42" text-anchor="middle" class="title">GeoPE 构造过程示意图</text>
    <text x="700" y="70" text-anchor="middle" class="subtitle">
      Text Encoder → Bearing Angle Calculation → Rotation-based GeoPE → RQ-VAE
    </text>
  </g>

  <!-- Left pipeline: input and encoder -->
  <g id="input-pipeline">
    <rect x="40" y="180" rx="18" ry="18" width="180" height="110" fill="#f8fafc" stroke="#64748b" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="130" y="220" text-anchor="middle" class="label">POI 类别名称</text>
    <text x="130" y="255" text-anchor="middle" class="mathsmall">Catname</text>

    <polygon points="280,160 430,190 430,310 280,340" fill="#eef2f7" stroke="#64748b" stroke-width="2.2" filter="url(#shadow)"/>
    <text x="340" y="220" text-anchor="middle" class="label">Text Encoder</text>
    <text x="340" y="255" text-anchor="middle" class="small">all-MiniLM-L6-v2</text>

    <line x1="220" y1="235" x2="275" y2="235" class="flow-line"/>
    <line x1="430" y1="235" x2="475" y2="235" class="flow-line"/>
  </g>

  <!-- Main GeoPE frame -->
  <g id="geope-main">
    <rect x="480" y="105" rx="32" ry="32" width="820" height="470" fill="url(#geopeGradient)" stroke="#1f2937" stroke-width="2.4" filter="url(#shadow)"/>
    <text x="890" y="145" text-anchor="middle" class="panel-title">Geographical Positional Encoding (GeoPE)</text>

    <!-- Step badges -->
    <g transform="translate(545,152)">
      <use href="#stepBadge"/>
      <text x="37" y="18" text-anchor="middle" class="step-tag">Step 1</text>
    </g>
    <g transform="translate(985,152)">
      <use href="#stepBadge"/>
      <text x="37" y="18" text-anchor="middle" class="step-tag">Step 2</text>
    </g>

    <!-- Subpanel 1: bearing angle -->
    <g id="bearing-panel">
      <rect x="525" y="180" width="360" height="290" fill="#f8fafc" stroke="#64748b" stroke-width="1.4" stroke-dasharray="7,5"/>
      <text x="705" y="205" text-anchor="middle" class="label">参考点构造与方位角计算</text>

      <rect x="545" y="225" width="320" height="225" fill="#f1f5f9" stroke="#64748b" stroke-width="0.9"/>
      <path d="M555 250 C620 280, 700 250, 855 305" stroke="#64748b" stroke-width="4.5" fill="none" opacity="0.28"/>
      <path d="M560 340 C650 330, 750 360, 850 350" stroke="#64748b" stroke-width="4.5" fill="none" opacity="0.28"/>
      <path d="M615 230 C625 300, 640 360, 670 440" stroke="#64748b" stroke-width="4" fill="none" opacity="0.22"/>
      <path d="M770 230 C745 290, 735 365, 720 445" stroke="#64748b" stroke-width="4" fill="none" opacity="0.22"/>

      <circle cx="700" cy="335" r="12" fill="#1f2937"/>
      <circle cx="700" cy="335" r="5" fill="#ffffff"/>
      <text x="725" y="345" class="math">L<tspan baseline-shift="sub" font-size="13">p</tspan></text>

      <g transform="translate(590,275)">
        <use href="#refPoint"/>
      </g>
      <g transform="translate(820,275)">
        <use href="#refPoint"/>
      </g>
      <g transform="translate(635,420)">
        <use href="#refPoint"/>
      </g>

      <text x="605" y="255" class="math">R<tspan baseline-shift="sub" font-size="13">1</tspan></text>
      <text x="835" y="255" class="math">R<tspan baseline-shift="sub" font-size="13">2</tspan></text>
      <text x="650" y="448" class="math">R<tspan baseline-shift="sub" font-size="13">3</tspan></text>

      <line x1="700" y1="335" x2="602" y2="282" class="inner-line"/>
      <line x1="700" y1="335" x2="808" y2="282" class="inner-line"/>
      <line x1="700" y1="335" x2="642" y2="408" class="inner-line"/>

      <text x="640" y="305" class="math">θ<tspan baseline-shift="sub" font-size="13">p,1</tspan></text>
      <text x="760" y="305" class="math">θ<tspan baseline-shift="sub" font-size="13">p,2</tspan></text>
      <text x="665" y="390" class="math">θ<tspan baseline-shift="sub" font-size="13">p,3</tspan></text>
    </g>

    <line x1="900" y1="320" x2="945" y2="320" class="flow-line"/>

    <!-- Subpanel 2: rotation geope -->
    <g id="rotation-panel">
      <rect x="965" y="180" width="290" height="290" fill="#f8fafc" stroke="#64748b" stroke-width="1.4" stroke-dasharray="7,5"/>
      <text x="1110" y="205" text-anchor="middle" class="label">向量分段与旋转编码</text>

      <text x="988" y="248" class="math">x<tspan baseline-shift="sub" font-size="13">p</tspan></text>

      <g transform="translate(1030,230)" style="color:#eef2f7;">
        <use href="#segmentBlock"/>
      </g>
      <g transform="translate(1100,230)" style="color:#eef2f7;">
        <use href="#segmentBlock"/>
      </g>
      <g transform="translate(1170,230)" style="color:#eef2f7;">
        <use href="#segmentBlock"/>
      </g>

      <text x="1059" y="278" text-anchor="middle" class="mathsmall">x<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(1)</tspan></text>
      <text x="1129" y="278" text-anchor="middle" class="mathsmall">x<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(2)</tspan></text>
      <text x="1199" y="278" text-anchor="middle" class="mathsmall">x<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(3)</tspan></text>

      <rect x="1023" y="300" rx="8" ry="8" width="72" height="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
      <rect x="1093" y="300" rx="8" ry="8" width="72" height="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
      <rect x="1163" y="300" rx="8" ry="8" width="72" height="28" fill="#e2e8f0" stroke="#64748b" stroke-width="1.1"/>
      <text x="1059" y="319" text-anchor="middle" class="mathsmall">R(θ<tspan baseline-shift="sub" font-size="11">p,1</tspan>)</text>
      <text x="1129" y="319" text-anchor="middle" class="mathsmall">R(θ<tspan baseline-shift="sub" font-size="11">p,2</tspan>)</text>
      <text x="1199" y="319" text-anchor="middle" class="mathsmall">R(θ<tspan baseline-shift="sub" font-size="11">p,3</tspan>)</text>

      <line x1="1059" y1="264" x2="1059" y2="298" class="inner-line"/>
      <line x1="1129" y1="264" x2="1129" y2="298" class="inner-line"/>
      <line x1="1199" y1="264" x2="1199" y2="298" class="inner-line"/>

      <line x1="1059" y1="328" x2="1059" y2="350" class="inner-line"/>
      <line x1="1129" y1="328" x2="1129" y2="350" class="inner-line"/>
      <line x1="1199" y1="328" x2="1199" y2="350" class="inner-line"/>

      <g transform="translate(1030,350)" style="color:#dbeafe;">
        <use href="#segmentBlock"/>
      </g>
      <g transform="translate(1100,350)" style="color:#dbeafe;">
        <use href="#segmentBlock"/>
      </g>
      <g transform="translate(1170,350)" style="color:#dbeafe;">
        <use href="#segmentBlock"/>
      </g>
      <text x="1059" y="398" text-anchor="middle" class="mathsmall">x̂<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(1)</tspan></text>
      <text x="1129" y="398" text-anchor="middle" class="mathsmall">x̂<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(2)</tspan></text>
      <text x="1199" y="398" text-anchor="middle" class="mathsmall">x̂<tspan baseline-shift="sub" font-size="12">p</tspan><tspan baseline-shift="super" font-size="12">(3)</tspan></text>

      <line x1="1059" y1="402" x2="1100" y2="430" class="inner-line"/>
      <line x1="1129" y1="402" x2="1129" y2="430" class="inner-line"/>
      <line x1="1199" y1="402" x2="1158" y2="430" class="inner-line"/>

      <text x="1110" y="424" text-anchor="middle" class="small">拼接</text>

      <text x="990" y="455" class="math">x'<tspan baseline-shift="sub" font-size="13">p</tspan></text>
      <rect x="1030" y="436" width="198" height="34" fill="#dbeafe" stroke="#1f2937" stroke-width="2"/>
      <line x1="1096" y1="436" x2="1096" y2="470" stroke="#1f2937" stroke-width="2"/>
      <line x1="1162" y1="436" x2="1162" y2="470" stroke="#1f2937" stroke-width="2"/>

      <text x="1110" y="466" text-anchor="middle" class="small">融合语义与地理方向信息的连续表示</text>
    </g>
  </g>

  <!-- Tail: quantization and output -->
  <g id="output-pipeline">
    <line x1="890" y1="575" x2="890" y2="625" class="flow-line"/>

    <rect x="760" y="635" rx="18" ry="18" width="260" height="70" fill="#f8fafc" stroke="#1f2937" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="890" y="665" text-anchor="middle" class="label">RQ-VAE</text>
    <text x="890" y="690" text-anchor="middle" class="small">学习地理增强 SID</text>

    <line x1="1020" y1="670" x2="1090" y2="670" class="flow-line"/>

    <rect x="1105" y="640" rx="16" ry="16" width="210" height="60" fill="#eef2f7" stroke="#2563eb" stroke-width="1.8" filter="url(#shadow)"/>
    <text x="1210" y="668" text-anchor="middle" class="label">SID</text>
    <text x="1210" y="690" text-anchor="middle" class="small">&lt;a_i&gt;&lt;b_j&gt;&lt;c_k&gt;...</text>
  </g>
</svg>